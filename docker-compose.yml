services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project01-backend
    env_file:
      - ./backend/.env
    ports:
      - "5001:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project01-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
